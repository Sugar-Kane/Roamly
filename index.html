<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Roamly Flow" />
    <meta name="theme-color" content="#16181D" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Roamly Flow: focus timer and study planner for PA school</title>
    <meta name="description" content="A free Pomodoro style focus timer and study planner built for PA school. Plan your sessions, stay focused, and track progress toward exams. No account needed." />
    <link rel="canonical" href="https://www.roamlyflow.com/" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Roamly Flow" />
    <meta property="og:title" content="Roamly Flow: focus timer and study planner for PA school" />
    <meta property="og:description" content="A free Pomodoro style focus timer and study planner built for PA school. Plan your sessions, stay focused, and track progress toward exams. No account needed." />
    <meta property="og:url" content="https://www.roamlyflow.com/" />
    <meta property="og:image" content="https://www.roamlyflow.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Roamly Flow: focus timer and study planner for PA school" />
    <meta name="twitter:description" content="A free Pomodoro style focus timer and study planner built for PA school. Plan your sessions, stay focused, and track progress toward exams. No account needed." />
    <meta name="twitter:image" content="https://www.roamlyflow.com/og-image.png" />
    <!-- Structured data (JSON-LD). Static and hand-authored so every value
         matches visible content: no ratings, reviews, user counts, or awards.
         The core focus timer is genuinely free, so the WebApplication carries a
         single $0 Offer. Cloned onto prerendered pages by scripts/prerender.mjs. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.roamlyflow.com/#organization",
          "name": "Roamly Flow",
          "url": "https://www.roamlyflow.com/",
          "logo": "https://www.roamlyflow.com/icon-512.png"
        },
        {
          "@type": "WebSite",
          "@id": "https://www.roamlyflow.com/#website",
          "name": "Roamly Flow",
          "url": "https://www.roamlyflow.com/",
          "publisher": { "@id": "https://www.roamlyflow.com/#organization" }
        },
        {
          "@type": "WebApplication",
          "@id": "https://www.roamlyflow.com/#webapp",
          "name": "Roamly Flow",
          "url": "https://www.roamlyflow.com/",
          "description": "A free Pomodoro style focus timer and study planner built for PA school. Plan your sessions, stay focused, and track progress toward exams.",
          "applicationCategory": "EducationalApplication",
          "operatingSystem": "Any",
          "browserRequirements": "Requires JavaScript.",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "publisher": { "@id": "https://www.roamlyflow.com/#organization" }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
