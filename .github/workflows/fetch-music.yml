# One-shot helper: downloads free-license focus-music tracks into
# public/audio/lofi/ and commits them, because the app's development
# environment can't fetch audio itself. Tracks are Kevin MacLeod's — CC0
# where mirrored on freepd.com, CC-BY 4.0 from incompetech.com otherwise
# (credited in the manifest and app).
name: Fetch focus music
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and validate tracks
        run: |
          set -e
          mkdir -p public/audio/lofi
          # slug|Title|category — "lofi" = chill jazz/lounge, "calm" = ambient/
          # meditation. A generous candidate list; the MIME/size check below
          # drops any title that doesn't resolve, so extras are harmless.
          # Aim for >60 min of validated audio per category so the in-app
          # shuffle (which plays every track before repeating) never recurs
          # within an hour. Over-list generously — the MIME/size check below
          # drops any title that doesn't resolve, so misses are harmless.
          tracks=(
            "airport-lounge|Airport Lounge|lofi"
            "backbay-lounge|Backbay Lounge|lofi"
            "lobby-time|Lobby Time|lofi"
            "george-street-shuffle|George Street Shuffle|lofi"
            "i-knew-a-guy|I Knew a Guy|lofi"
            "bass-walker|Bass Walker|lofi"
            "smooth-lovin|Smooth Lovin|lofi"
            "dreams-become-real|Dreams Become Real|lofi"
            "wallpaper|Wallpaper|lofi"
            "cool-vibes|Cool Vibes|lofi"
            "local-forecast-elevator|Local Forecast - Elevator|lofi"
            "the-curtain-rises|The Curtain Rises|lofi"
            "vibe-ace|Vibe Ace|lofi"
            "off-to-osaka|Off to Osaka|lofi"
            "bossa-antigua|Bossa Antigua|lofi"
            "casa-bossa-nova|Casa Bossa Nova|lofi"
            "marty-gots-a-plan|Marty Gots a Plan|lofi"
            "hep-cats|Hep Cats|lofi"
            "sidewalk-shade|Sidewalk Shade|lofi"
            "spy-glass|Spy Glass|lofi"
            "pina-colada|Pina Colada|lofi"
            "brightly-fancy|Brightly Fancy|lofi"
            "faster-does-it|Faster Does It|lofi"
            "life-of-riley|Life of Riley|lofi"
            "sunday-plans|Sunday Plans|lofi"
            "walking-along|Walking Along|lofi"
            "batty-mcfaddin|Batty McFaddin|lofi"
            "the-jazz-piano|The Jazz Piano|lofi"
            "meditation-impromptu-01|Meditation Impromptu 01|calm"
            "meditation-impromptu-02|Meditation Impromptu 02|calm"
            "meditation-impromptu-03|Meditation Impromptu 03|calm"
            "healing|Healing|calm"
            "almost-in-f-tranquility|Almost in F - Tranquility|calm"
            "serenity|Serenity|calm"
            "reawakening|Reawakening|calm"
            "peace-of-mind|Peace of Mind|calm"
            "relaxing-piano-music|Relaxing Piano Music|calm"
            "ossuary-1-a-beginning|Ossuary 1 - A Beginning|calm"
            "ossuary-5-rest|Ossuary 5 - Rest|calm"
            "ossuary-6-air|Ossuary 6 - Air|calm"
            "fluidscape|Fluidscape|calm"
            "heartbreaking|Heartbreaking|calm"
            "impact-andante|Impact Andante|calm"
            "the-descent|The Descent|calm"
            "at-rest|At Rest|calm"
            "long-note-two|Long Note Two|calm"
            "wounded|Wounded|calm"
            "anxiety|Anxiety|calm"
            "returning-motion|Returning Motion|calm"
          )
          : > /tmp/manifest-lines
          for entry in "${tracks[@]}"; do
            slug="${entry%%|*}"; rest="${entry#*|}"; title="${rest%%|*}"; category="${rest#*|}"
            enc=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$title")
            out="public/audio/lofi/$slug.mp3"
            got=""
            for src in "freepd|https://freepd.com/music/$enc.mp3" \
                       "incompetech|https://incompetech.com/music/royalty-free/mp3-royaltyfree/$enc.mp3"; do
              name="${src%%|*}"; url="${src#*|}"
              echo "trying $url"
              if curl -fsSL --max-time 120 -A "roamly-music-fetch" -o "$out" "$url"; then
                type=$(file -b --mime-type "$out")
                size=$(stat -c%s "$out")
                if [ "$type" = "audio/mpeg" ] && [ "$size" -gt 800000 ]; then
                  echo "OK: $slug ($size bytes, $name, $category)"
                  echo "$slug|$title|$name|$category" >> /tmp/manifest-lines
                  got=1; break
                fi
                echo "rejected: $slug from $name (type=$type size=$size)"
              fi
              rm -f "$out"
            done
            [ -z "$got" ] && echo "MISS: $title (no working source)"
          done
          count=$(wc -l < /tmp/manifest-lines)
          echo "downloaded $count tracks"
          [ "$count" -ge 3 ] || { echo "too few tracks — aborting without commit"; exit 1; }
          python3 - <<'EOF'
          import json
          rows = []
          for line in open("/tmp/manifest-lines"):
              slug, title, source, category = line.strip().split("|")
              rows.append({"file": f"/audio/lofi/{slug}.mp3", "title": title,
                           "artist": "Kevin MacLeod", "source": source,
                           "license": "CC0" if source == "freepd" else "CC BY 4.0",
                           "category": category})
          json.dump(rows, open("public/audio/lofi/manifest.json", "w"), indent=2)
          EOF
      - name: Report per-category duration
        run: |
          # The in-app shuffle plays every track in a category before repeating,
          # so each category needs >60 min of audio to never recur within an
          # hour. Warn (don't fail) if a category is short.
          pip install --quiet mutagen
          python3 - <<'EOF'
          import json, collections
          from mutagen.mp3 import MP3
          rows = json.load(open("public/audio/lofi/manifest.json"))
          mins = collections.defaultdict(float); n = collections.defaultdict(int)
          for r in rows:
              try:
                  mins[r["category"]] += MP3("public" + r["file"]).info.length / 60
                  n[r["category"]] += 1
              except Exception as e:
                  print("could not read", r["file"], e)
          for cat in sorted(mins):
              flag = "OK" if mins[cat] >= 60 else "SHORT (<60 min — add more titles)"
              print(f"{cat}: {n[cat]} tracks, {mins[cat]:.1f} min  [{flag}]")
          EOF
      - name: Commit tracks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/audio/lofi
          git commit -m "Add free-license focus music tracks (Kevin MacLeod, CC0/CC-BY)"
          git push
