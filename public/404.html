<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Roamly Flow</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        background: #16181D;
        color: #e7e7ea;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 28rem; }
      img { width: 56px; height: 56px; margin: 0 auto 1.25rem; display: block; }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
      p { color: #a6a6ad; line-height: 1.5; margin: 0 0 1.5rem; }
      a.button {
        display: inline-block;
        padding: 0.7rem 1.25rem;
        border-radius: 9999px;
        background: #7c6cff;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
      a.button:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/favicon.png" alt="" />
      <h1>Page not found</h1>
      <p>That page does not exist or has moved. Head back to the focus timer to keep studying.</p>
      <a class="button" href="/">Go to Roamly Flow</a>
    </div>
  </body>
</html>
